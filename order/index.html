<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>汉堡小屋</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
  body{background:#f7f8fa;padding:20px}
  .title{text-align:center;font-size:24px;margin:20px 0}
  .food-box{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-bottom:30px}
  .food{width:200px;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px #00000010}
  .food img{width:100%;height:130px;object-fit:cover}
  .info{padding:12px}
  .name{font-weight:bold;margin-bottom:6px}
  .price{color:#f54;color:#f43;font-weight:bold;margin-bottom:10px}
  .ctrl{display:flex;align-items:center;gap:10px;justify-content:center}
  .ctrl button{width:30px;height:30px;border:none;background:#eee;border-radius:6px;cursor:pointer}
  .cart{max-width:500px;margin:0 auto;background:white;padding:20px;border-radius:12px}
  .cart h3{margin-bottom:14px}
  .item{display:flex;justify-content:space-between;margin:6px 0}
  .total{text-align:right;font-size:18px;font-weight:bold;color:#f43;margin-top:14px;padding-top:14px;border-top:1px solid #eee}
  .clear{margin-top:14px;width:100%;padding:10px;background:#f43;color:white;border:none;border-radius:8px;cursor:pointer}

</style>
</head>

<body>
  <h2 class="title">🍔汉堡大点兵</h2>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.css">
<script src="https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.js"></script>



  <div class="food-box">
    <div class="food">
      <img src="https://pics.akarin.online/2026/03/492d06d24b1d0f687af304f4ac7d3b7d.jpg" alt="蜜雪冰城">
      <div class="info">
        <div class="name">蜜雪冰城</div>
        <div class="price">0元</div>
        <div class="ctrl">
          <button onclick="set('rou',0,-1)">-</button>
          <span id="rou">0</span>
          <button onclick="set('rou',0,1)">+</button>
        </div>
      </div>
    </div>

    <div class="food">
      <img src="https://pics.akarin.online/2026/03/669e0a65dcb86768823adbba26b88b45.jpg" alt="茶百道">
      <div class="info">
        <div class="name">茶百道</div>
        <div class="price">0元</div>
        <div class="ctrl">
          <button onclick="set('yu',0,-1)">-</button>
          <span id="yu">0</span>
          <button onclick="set('yu',0,1)">+</button>
        </div>
      </div>
    </div>

    <div class="food">
      <img src="https://pics.akarin.online/2026/03/6e803565b403e149a3210f722b560e8c.jpg" alt="瑞幸">
      <div class="info">
        <div class="name">瑞幸</div>
        <div class="price">0元</div>
        <div class="ctrl">
          <button onclick="set('dan',0,-1)">-</button>
          <span id="dan">0</span>
          <button onclick="set('dan',0,1)">+</button>
        </div>
      </div>
    </div>

    <div class="food">
      <img src="https://pics.akarin.online/2026/03/c1a285bb55edbffbfc47bf6feb565d8c.jpg" alt="霸王茶姬">
      <div class="info">
        <div class="name">霸王茶姬</div>
        <div class="price">0元</div>
        <div class="ctrl">
          <button onclick="set('ji',0,-1)">-</button>
          <span id="ji">0</span>
          <button onclick="set('ji',0,1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cart">
    <h3>🛒 已点菜品</h3>
    <div id="list"></div>
    <div class="total">合计：<span id="total">0</span> 元</div>
    <button class="clear" onclick="clearAll()">提交下单</button>
  </div>

  <div id="sakura-bg"
  style="position: fixed;top: 0;left: 0;width: 100vw;height: 100vh;pointer-events: none;z-index: 9999;">
  </div>

<script>
  // 当网页加载完成后启动樱花
  document.addEventListener('DOMContentLoaded', function() {
    var sakura = new Sakura('#sakura-bg', {
      colors: [
        {
          gradientColorStart: 'rgba(255, 183, 197, 0.9)',
          gradientColorEnd: 'rgba(255, 197, 208, 0.9)',
          gradientColorDegree: 120,
        }
      ],
      delay: 200, // 樱花生成的延迟时间
    });
  });
</script>


<script>
  let data = { rou:0, yu:0, dan:0, ji:0 };
  let names = { rou:"蜜雪冰城", yu:"茶百道", dan:"瑞幸", ji:"霸王茶姬" };
  let prices = { rou:0, yu:0, dan:0, ji:0 };

  function set(key, p, num) {
    data[key] += num;
    if (data[key] < 0) data[key] = 0;
    document.getElementById(key).innerText = data[key];
    update();
  }

  function update() {
    let list = document.getElementById("list");
    list.innerHTML = "";
    let total = 0;
    for (let k in data) {
      let c = data[k];
      if (c <= 0) continue;
      let subtotal = c * prices[k];
      total += subtotal;
      list.innerHTML += `<div class="item"><span>${names[k]} × ${c}</span><span>${subtotal} 元</span></div>`;
    }
    document.getElementById("total").innerText = total;
  }

function clearAll() {
    for (let k in data) data[k] = 0;
    update();
    document.querySelectorAll(".ctrl span").forEach(s => s.innerText = 0);
    const token = "5a6edb23ac3046cfbea440ae06817cac";
    const message = `🛒 购物车已清空: ${new Date().toLocaleString('zh-CN')}`;
    const url = `https://www.pushplus.plus/send?token=${token}&title=购物车清空通知&content=${encodeURIComponent(message)}&channel=mail`;
    fetch(url)
        .then(res => res.json())
        .then(result => {
            if (result.code === 200) {
                alert("✅ 通知已发送到QQ邮箱！");
            } else {
                alert("❌ 发送失败：" + result.msg + "（错误码：" + result.code + "）");
            }
        })
        .catch(err => {
            alert("❌ 网络错误：" + err);
        });
}



</script>
</body>

</html>
